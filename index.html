<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroller - Bi-directional</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    .item {
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 20px;
      margin: 10px 0;
      border-radius: 4px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-marker {
      text-align: center;
      background: #333;
      color: #fff;
      padding: 5px;
      font-size: 0.8rem;
    }

    /* Ensure anchoring works */
    #content-area {
      overflow-anchor: auto;
    }
  </style>
</head>

<body>
  <h1>Infinite Scroller - Bi-directional & Windowing</h1>
  <p>Scroll up or down. We simulate network latency.</p>
  <p>Status: <span id="status">Idle</span></p>
  <p>Pages Loaded: <span id="pages-loaded"></span></p>

  <infinite-scroller id="scroller">
    <div id="content-area"></div>
  </infinite-scroller>

  <script type="module">
    import { register } from './src/index.ts'
    import { ApiSimulator } from './src/api-simulator.ts'

    register();

    const api = new ApiSimulator();
    const scroller = document.getElementById('scroller');
    const contentArea = document.getElementById('content-area');
    const statusSpan = document.getElementById('status');
    const pagesLoadedSpan = document.getElementById('pages-loaded');

    // State
    let loadedPages = new Map(); // pageNum -> Element (Div containing items)

    // We want to keep max N pages.
    const MAX_PAGES = 10;
    const BUFFER_SIZE = 2; // Keep at least 2 pages above and below

    // URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const startPage = parseInt(urlParams.get('page')) || 1;

    // Start at page X
    let minPage = startPage;
    let maxPage = startPage;

    // Observer for rehydrating virtualized pages
    let rehydrationObserver = null;

    function setupRehydrationObserver() {
      if (rehydrationObserver) {
        rehydrationObserver.disconnect();
      }

      rehydrationObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const pageNum = parseInt(entry.target.dataset.page);
            const pageEl = loadedPages.get(pageNum);

            // Only rehydrate if it's virtualized (no children)
            if (pageEl && pageEl.children.length === 0) {
              // Determine position based on whether it's above or below current range
              const position = pageNum < minPage ? 'prepend' : 'append';
              loadPage(pageNum, position);
            }
          }
        });
      }, {
        root: null, // viewport
        rootMargin: '500px', // Trigger when within 500px of viewport
        threshold: 0
      });

      // Observe all virtualized pages
      loadedPages.forEach((pageEl, pageNum) => {
        if (pageEl.children.length === 0) {
          rehydrationObserver.observe(pageEl);
        }
      });
    }

    async function loadPage(pageNum, position) {
      // Skip if already loaded and hydrated (has content)
      const existing = loadedPages.get(pageNum);
      if (existing && existing.children.length > 0) return;

      // Prevent re-entry if already loading (simple lock)
      if (scroller.isLoading) return;

      // Check if we already have a container (virtualized)
      let pageDiv = loadedPages.get(pageNum);
      const isRehydrating = !!pageDiv;

      scroller.isLoading = true;
      statusSpan.textContent = `${isRehydrating ? 'Rehydrating' : 'Loading'} Page ${pageNum}...`;

      try {
        const data = await api.getPage(pageNum);

        if (!pageDiv) {
          pageDiv = document.createElement('div');
          pageDiv.className = 'page-container';
          pageDiv.dataset.page = pageNum;
        } else {
          // Clear current content (placeholder or old items)
          pageDiv.innerHTML = '';
          pageDiv.style.height = '';
        }

        const header = document.createElement('div');
        header.className = 'page-marker';
        header.textContent = `--- Page ${pageNum} ---`;
        pageDiv.appendChild(header);

        data.items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';
          div.textContent = item.text;
          pageDiv.appendChild(div);
        });

        // Insert into DOM if new, or update tracking if rehydrating
        if (!isRehydrating) {
          if (position === 'append') {
            contentArea.appendChild(pageDiv);
            maxPage = Math.max(maxPage, pageNum);
          } else {
            // PREPEND
            contentArea.insertBefore(pageDiv, contentArea.firstElementChild);
            minPage = Math.min(minPage, pageNum);
          }
          loadedPages.set(pageNum, pageDiv);
        } else {
          // When rehydrating, update our tracking of min/max hydrated pages
          if (position === 'append') {
            maxPage = Math.max(maxPage, pageNum);
          } else {
            minPage = Math.min(minPage, pageNum);
          }
        }

        // Prune
        prunePages(position);

        updateDebug();

        // Update rehydration observer to watch virtualized pages
        setupRehydrationObserver();

      } finally {
        scroller.isLoading = false;
        statusSpan.textContent = 'Idle';
      }
    }

    function prunePages(lastAction) {
      const hydratedPages = Array.from(loadedPages.keys())
        .filter(pageNum => loadedPages.get(pageNum).children.length > 0)
        .sort((a, b) => a - b);

      if (hydratedPages.length > MAX_PAGES) {
        if (lastAction === 'append') {
          const pageToRemove = hydratedPages[0];
          virtualizePage(pageToRemove);
        } else {
          const pageToRemove = hydratedPages[hydratedPages.length - 1];
          virtualizePage(pageToRemove);
        }

        // Recalculate min/max after virtualization
        const remainingHydrated = Array.from(loadedPages.keys())
          .filter(pageNum => loadedPages.get(pageNum).children.length > 0)
          .sort((a, b) => a - b);

        if (remainingHydrated.length > 0) {
          minPage = remainingHydrated[0];
          maxPage = remainingHydrated[remainingHydrated.length - 1];
        }
      }
    }

    function virtualizePage(pageNum) {
      const el = loadedPages.get(pageNum);
      if (el && el.children.length > 0) {
        const rect = el.getBoundingClientRect();
        el.style.height = `${rect.height}px`;
        el.innerHTML = ''; // Keep size, drop content
        // We keep it in loadedPages but it's now "virtual"
      }
    }

    function createPlaceholders(uptoPage) {
      for (let i = 1; i < uptoPage; i++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page-container';
        pageDiv.dataset.page = i;
        pageDiv.style.height = '80vh'; // Configurable default height
        contentArea.appendChild(pageDiv);
        loadedPages.set(i, pageDiv);
      }
      minPage = 1;

      // Setup observer for placeholders
      setupRehydrationObserver();
    }

    function updateDebug() {
      const pages = Array.from(loadedPages.keys()).sort((a, b) => a - b);
      pagesLoadedSpan.textContent = pages.join(', ');
    }

    // Initial Load: Load start page and buffer
    async function init() {
      if (startPage > 1) {
        createPlaceholders(startPage);
      }

      await loadPage(startPage, 'append');

      // Load 2 pages down
      for (let i = 1; i <= BUFFER_SIZE; i++) {
        await loadPage(startPage + i, 'append');
      }

      // Load 2 pages up if possible
      for (let i = 1; i <= BUFFER_SIZE; i++) {
        const prevPage = startPage - i;
        if (prevPage >= 1) {
          await loadPage(prevPage, 'prepend');
        }
      }

      // If we started deep, we need to ensure we are visible
      if (startPage > 1) {
        setTimeout(() => {
          const target = loadedPages.get(startPage);
          if (target) {
            target.scrollIntoView({ block: 'start' });
          }
        }, 500);
      }
    }

    init().catch(err => {
      console.error('Init failed:', err);
      statusSpan.textContent = 'Error: ' + err.message;
    });

    // Event Listeners
    scroller.addEventListener('load-next', (e) => {
      console.log('Event: load-next', e);
      loadPage(maxPage + 1, 'append');
    });

    scroller.addEventListener('load-prev', (e) => {
      console.log('Event: load-prev', e);
      if (minPage > 1) {
        loadPage(minPage - 1, 'prepend');
      }
    });

  </script>
</body>

</html>
