<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Scroller Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="container mx-auto min-h-screen p-4">
    <h1 class="text-2xl font-bold mb-4">Infinite Scroller Demo</h1>

    <!-- Mobile toggle button: only visible on small screens -->
    <button
      id="settings-toggle"
      aria-label="Open settings"
      class="md:hidden fixed bottom-6 right-6 z-50 w-12 h-12 rounded-full bg-indigo-600 text-white shadow-2xl flex items-center justify-center text-xl transition-transform active:scale-90"
    >
      ⚙
    </button>

    <!-- Floating settings panel -->
    <div
      id="settings-panel"
      class="fixed bottom-6 right-6 z-50 rounded-2xl bg-white/80 backdrop-blur-md shadow-2xl border border-gray-200 p-5 flex flex-col gap-4
             translate-y-[calc(100%+1.5rem)] md:translate-y-0 transition-transform duration-300"
    >
      <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-widest">
        Settings
      </h2>

      <form method="get" class="flex flex-col gap-4">
        <label class="flex flex-col gap-1">
          <span class="text-xs text-gray-500">Items per page</span>
          <input
            id="setting-page-size"
            type="number"
            min="1"
            max="100"
            value="15"
            class="rounded-lg border border-gray-400 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            name="page-size"
          />
        </label>

        <label class="flex flex-col gap-1">
          <span class="text-xs text-gray-500">Total pages</span>
          <input
            id="setting-total-pages"
            type="number"
            min="1"
            value="3000"
            class="rounded-lg border border-gray-400 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            name="total-pages"
          />
        </label>

        <button
          id="setting-update-btn"
          class="rounded-lg bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-indigo-700 active:scale-95 transition-all"
          type="submit"
        >
          Update
        </button>
      </form>

      <div class="h-px bg-gray-200"></div>

      <label class="flex flex-col gap-1">
        <span class="text-xs text-gray-500">Jump to page</span>
        <div class="flex gap-2">
          <input
            id="setting-jump-page"
            type="number"
            min="1"
            placeholder="Page #"
            class="flex-1 rounded-lg border border-gray-400 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          />
          <button
            id="setting-jump-btn"
            class="rounded-lg bg-indigo-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-indigo-700 active:scale-95 transition-all"
          >
            Go
          </button>
        </div>
      </label>

      <p class="text-xs text-gray-400">
        Current page: <span id="setting-current-page">1</span>
      </p>
    </div>

    <infinite-scroller id="my-scroller">
      <!-- only the first element is used by the code -->
      <ul class="grid gap-6"></ul>

      <!-- this is just so that tailwind styles are imported correctly. can't be a <template> -->
      <div
        class="absolute z-3 bg-yellow-500 font-mono p-1 text-xl"
        style="display: none"
      ></div>
      <div
        class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"
        style="display: none"
      >
        <div
          class="group relative overflow-hidden rounded-xl bg-white shadow-md transition-all duration-300 hover:shadow-xl"
          data-item-template
        >
          <div
            class="aspect-w-1 aspect-h-1 xl:aspect-w-7 xl:aspect-h-8 w-full overflow-hidden bg-gray-200"
          >
            <img
              class="h-full w-full object-cover object-center transition-opacity duration-300 group-hover:opacity-75"
              data-content="image"
            />
          </div>
          <div class="flex">
            <button class="flex-grow overflow-hidden p-4 text-left">
              <h3
                class="truncate text-sm text-gray-500"
                data-content="title"
              ></h3>
              <p class="mt-1 text-xs text-gray-400" data-content="caption"></p>
            </button>
          </div>
          <button
            class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 transition-opacity duration-300 group-hover:opacity-100"
            data-content="view-button"
          >
            <span
              class="rounded-full bg-white px-4 py-2 font-medium text-black transition-colors hover:bg-gray-100"
              >View Details
            </span>
          </button>
        </div>
      </div>
    </infinite-scroller>

    <script type="module" src="index.js"></script>
  </body>
</html>
